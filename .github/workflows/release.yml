name: Auto Release on Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate Version Number
      id: version
      run: |
        # 生成日期+运行号的版本格式 (示例: v20240322.1)
        echo "VERSION=v$(date +%Y%m%d).${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

    - name: Create Release Package
      run: |
        # 打包所有文件（排除.git目录）
        mkdir -p install
        rsync -a --exclude='.git' --exclude='install' . install/
        tar czf release.tar.gz install/

    - name: Create GitHub Release
      id: create-release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.VERSION }}
        release_name: ${{ env.VERSION }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create-release.outputs.upload_url }}
        asset_path: ./release.tar.gz
        asset_name: k8s-setup-${{ env.VERSION }}.tar.gz
        asset_content_type: application/gzip

    - name: Install MinIO Client
      run: |
        wget -O mc https://dl.min.io/client/mc/release/linux-amd64/archive/mc.RELEASE.2025-04-08T15-39-49Z
        chmod +x mc
        sudo mv mc /usr/local/bin/

    - name: Configure MinIO Host
      run: |
        mc config host add minio ${{ secrets.MINIO_URL }} ${{ secrets.MINIO_ACCESS_KEY }} ${{ secrets.MINIO_SECRET_KEY }}
        cat ~/.mc/config.json

    - name: Upload to MinIO
      run: |
        mc cp release.tar.gz minio/k8s/release.tar.gz
